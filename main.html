<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Lyric & Comment Timeline</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h2>Song Player & Annotator</h2>
        <audio id="audio-player" controls src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
        <input type="file" id="audio-upload" accept="audio/*">
    </header>

    <div class="main-container">
        <div class="lyric-timeline" id="lyric-timeline"></div>

        <div class="comment-section">
            <div class="comments-display" id="comments-display"></div>
            
            <form class="comment-form" id="comment-form">
                <input type="text" id="comment-input" pl    aceholder="Add a comment at the current timestamp..." required>
                <button type="submit">Comment</button>
            </form>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
