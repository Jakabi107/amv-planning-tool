<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMV Planning Tool</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/icon.png">
</head>
<body>

    <header>
        <h2>AMV Planning Tool</h2>
        <h1 id="title" contenteditable="plaintext-only" onkeydown="preventEnter(event)" onfocus="this.style.outline='none'">Unnamed</h1>
        <audio id="audio-player" controls src=""></audio>
        <input type="file" id="audio-upload" accept="audio/*">
        <input type="file" id="lyrics-upload" accept=".lrc">
        <input type="file" id="comments-upload" accept=".json">
        <input type="file" id="all-data-upload" accept=".amvp">
    </header>

    <div class="main-container">
        <div class="lyric-timeline" id="lyric-timeline"></div>

        <div class="comment-section">
            <div class="comments-display" id="comments-display"></div>
            
            <form class="comment-form" id="comment-form">
                <input type="text" id="comment-input" pl    aceholder="Add a comment at the current timestamp..." required>
                <button type="submit">Comment</button>
            </form>
        </div>
    </div>
    <script src="utils.js" defer></script>
    <script src="script.js" defer></script>
</body>
</html>
